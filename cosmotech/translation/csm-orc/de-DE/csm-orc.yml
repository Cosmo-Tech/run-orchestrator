# Protokollmeldungen für den Cosmotech Orchestrator

logs:
  # Schrittbezogene Meldungen
  step:
    already_ready: "{step_id} bereits bereit"
    template_not_found: "{step_id} fordert eine nicht existierende Vorlage {command_id} an"
    loading_template: "{step_id} lädt Vorlage {command_id}"
    starting: "Starte {step_type} {step_id}"
    skipping_previous_errors: "Überspringe {step_type} {step_id} aufgrund vorheriger Fehler"
    skipping_as_required: "Überspringe {step_type} {step_id} wie erforderlich"
    running_command: "Ausführung: {command}"
    error_during: "Fehler während {step_type} {step_id}"
    done_running: "Ausführung von {step_type} {step_id} abgeschlossen"
    command_required: "Ein Schritt benötigt entweder einen Befehl oder eine Befehls-ID"
    template_unavailable: "Befehlsvorlage {command_id} ist nicht verfügbar"
    info:
      header: "Schritt {id}"
      command: "Befehl: {command}"
      description_header: "Beschreibung:"
      environment_header: "Umgebung:"
      optional: "(Optional)"
      use_system_env: "- Systemumgebungsvariablen verwenden"
      skipped: "- Von Benutzer übersprungen"
      status: "Status: {status}"
      simple_repr: "{id} ({status}): {description}"
      simple_repr_no_desc: "{id} ({status})"

  # Orchestrator-Meldungen
  orchestrator:
    loading_step: "Lade {id} vom Typ Step"
    valid_file: "{file_path} ist eine gültige Orchestrierungsdatei"
    step_already_defined: "Schritt {step_id} ist bereits definiert"
    step_not_exists: "Schritt {step_id} existiert nicht"
    dependencies:
      header: "Abhängigkeiten von {step_id}:"
      no_dependencies: "Keine Abhängigkeiten für {step_id}"
      found: "Gefunden {precedent}"
    environment:
      defined: "Umgebungsvariable definiert für {file_name}"
      variable: "{key}{description}"
      missing: "Fehlende Umgebungswerte für Schritt {step_id}"
      missing_value: "{key}: {value}"

  # Bibliotheksmeldungen
  library:
    content: "Bibliotheksinhalt:"
    templates_from: "Vorlagen von '{plugin_name}':"
    template_overriden: "- '{template_id}': ÜBERSCHRIEBEN"
    template_info: "{template}"
    template_desc: "- '{id}'{description}"
    template_invalid: "{template_id} ist keine gültige Vorlagen-ID"
    plugin:
      loading: "Lade Plugin {name}"
      loaded_templates: "{count} Vorlagen aus Plugin-Dateien geladen"
      template_count: "Plugin enthält {count} Vorlagen"
    reloading: "Lade Vorlagenbibliothek neu"
    loading: "Lade Vorlagenbibliothek"

  # Einstiegspunkt-Meldungen
  entrypoint:
    context: "Setze Kontext aus project.csm"
    simulation:
      info: "Simulation: {simulation}"
      probes_topic: "Sondenmessungen-Thema: {topic}"
      no_probes_topic: "Kein Sondenmessungen-Thema"
      control_topic: "Steuerungsebenen-Thema: {topic}. Simulator-Binärdatei kann CSM_CONTROL_PLANE_TOPIC direkt verarbeiten, daher wird es nicht als Argument transformiert."
      no_control_topic: "Kein Steuerungsebenen-Thema"
      args: "Simulator-Argumente: {args}"
      no_template: "Keine Ausführungsvorlagen-ID in Umgebungsvariable \"CSM_RUN_TEMPLATE_ID\" definiert, führe direkten Simulator-Modus aus"
    start: "Csm-orc Einstiegspunkt"

  # Vorlagenliste
  templates:
    template_info: "{template}"
    template_desc: "- '{id}'{description}"
    no_templates: "Keine Vorlagen zum Anzeigen verfügbar"

  # Ausführungsmeldungen
  run:
    starting: "Starte Ausführungs-Orchestrator Version {version}"
    sections:
      run: "===      Ausführung     ==="
      results: "===     Ergebnisse    ==="
      exit_handlers: "===   Beendigungshandler   ==="
    writing_env: "Schreibe Umgebungsdatei \"{target}\""

  # Dokumentation
  docs:
    open_failed: "Öffnen fehlgeschlagen: {url}"
    opened: "Geöffnet {url} in Ihrem Navigator"

  # Fehlermeldungen
  errors:
    missing_library: "Sie müssen die Bibliothek `cosmotech-run-orchestrator` in Ihrem Container installieren. Überprüfen Sie, ob Sie sie in Ihrer requirements.txt angegeben haben."
    no_run_json: "Keine \"run.json\" für die Ausführungsvorlage {template_id} definiert"
    missing_env_vars: "Fehlende Umgebungsvariablen, überprüfen Sie die Protokolle"
