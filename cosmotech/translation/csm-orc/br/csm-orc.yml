      missing_value: "Pazenn {step_id}: Ezvonedenn ret '{output}' o vankout"
      missing_required: "Pazenn {step_id}: Ezvonadennoù ret o vankout: {outputs}"
    info:
      header: "Pazenn {id}"
      command: "Urzhiad: {command}"
      description_header: "Deskrivadur:"
      environment_header: "Endro:"
