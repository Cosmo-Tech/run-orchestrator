# Kemennadennoù kerzhañ evit an Orchestrator Cosmotech

logs:
  # Kemennadennoù liammet d'ar pazennoù
  step:
    already_ready: "{step_id} prest endeo"
    template_not_found: "{step_id} o c'houlenn ur patrom n'eus ket {command_id}"
    loading_template: "{step_id} o kargañ ar patrom {command_id}"
    starting: "O kregiñ gant {step_type} {step_id}"
    skipping_previous_errors: "O tremen {step_type} {step_id} abalamour da fazioù kent"
    skipping_as_required: "O tremen {step_type} {step_id} evel goulennet"
    running_command: "O seveniñ: {command}"
    error_during: "Fazi e-pad {step_type} {step_id}"
    done_running: "Echu seveniñ {step_type} {step_id}"
    command_required: "Ur bazenn a c'houlenn un urzhiad pe un ID urzhiad"
    template_unavailable: "Patrom urzhiad {command_id} n'eo ket hegerz"
    input:
      default_value: "Pazenn {step_id}: Oc'h implijout an talvoud dre ziouer evit ar monedenn '{input}': {value}"
      missing_required: "Pazenn {step_id}: Monedenn ret '{input}' o vankout"
    output:
      default_value: "Pazenn {step_id}: Oc'h implijout an talvoud dre ziouer evit an ezvonedenn '{output}': {value}"
      captured_values_header: "Pazenn {step_id}: Talvoudoù ezvonedenn tapet:"
