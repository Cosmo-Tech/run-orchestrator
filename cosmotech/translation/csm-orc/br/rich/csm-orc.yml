  # Roll ar patromoù
  templates:
    template_info: "{template}"
    template_desc: "- [cyan]'{id}'[/]{description}"
    no_templates: "[yellow]N'eus patrom ebet da ziskouez[/]"

  # Kemennadennoù seveniñ
  run:
    starting: "O kregiñ gant an orchestrator stumm [cyan]{version}[/]"
    sections:
      run: "[bold cyan]===      Seveniñ     ===[/]"
      results: "[bold green]===     Disoc'hoù    ===[/]"
      exit_handlers: "[bold yellow]===   Merour Kuitaat   ===[/]"
