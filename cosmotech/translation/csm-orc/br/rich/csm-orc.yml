  # Teuliadur
  docs:
    open_failed: "[red]C'hwitadenn en ur zigeriñ:[/] {url}"
    opened: "Digoret [cyan]{url}[/] en ho merdeer"

  # Kemennadennoù fazi
  errors:
    missing_library: "[red]Ret eo deoc'h staliañ al levraoueg[/] [cyan]`cosmotech-run-orchestrator`[/] [red]en ho konteneur. Gwiriit ma'z eo termenet en ho requirements.txt.[/]"
    no_run_json: "[red]N'eus \"run.json\" ebet termenet evit ar patrom seveniñ[/] [yellow]{template_id}[/]"
    missing_env_vars: "[red]Arventennoù endro o vankout, gwiriit ar c'herzhlevr[/]"
