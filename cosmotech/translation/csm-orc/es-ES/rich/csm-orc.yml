# Mensajes de registro para el Orquestador Cosmotech

logs:
  # Mensajes relacionados con los pasos
  step:
    already_ready: "[green]{step_id}[/] ya está listo"
    template_not_found: "[red]{step_id}[/] solicita una plantilla inexistente [yellow]{command_id}[/]"
    loading_template: "[green]{step_id}[/] carga la plantilla [cyan]{command_id}[/]"
    starting: "Iniciando [bold]{step_type}[/] [green]{step_id}[/]"
    skipping_previous_errors: "Omitiendo [bold]{step_type}[/] [yellow]{step_id}[/] debido a errores previos"
    skipping_as_required: "Omitiendo [bold]{step_type}[/] [yellow]{step_id}[/] según lo requerido"
    running_command: "Ejecutando: [cyan]{command}[/]"
    error_during: "[red]Error[/] durante [bold]{step_type}[/] [yellow]{step_id}[/]"
    done_running: "[green]Finalizada[/] la ejecución de [bold]{step_type}[/] [green]{step_id}[/]"
    command_required: "[red]Un paso requiere un comando o un ID de comando[/]"
    template_unavailable: "La plantilla de comando [red]{command_id}[/] no está disponible"
    info:
      header: "Paso [cyan]{id}[/]"
      command: "Comando: [cyan]{command}[/]"
      description_header: "[bold]Descripción:[/]"
      environment_header: "[bold]Entorno:[/]"
      optional: "[yellow](Opcional)[/]"
      use_system_env: "- [cyan]Usar variables de entorno del sistema[/]"
      skipped: "- [yellow]Omitido por el usuario[/]"
      status: "Estado: [cyan]{status}[/]"
      simple_repr: "[cyan]{id}[/] ([yellow]{status}[/]): {description}"
      simple_repr_no_desc: "[cyan]{id}[/] ([yellow]{status}[/])"

  # Mensajes del orquestador
  orchestrator:
    loading_step: "Cargando [green]{id}[/] de tipo [yellow]Step[/]"
    valid_file: "[green]{file_path}[/] es un archivo de orquestación válido"
    step_already_defined: "[red]El paso[/] [yellow]{step_id}[/] [red]ya está definido[/]"
    step_not_exists: "[red]El paso[/] [yellow]{step_id}[/] [red]no existe[/]"
    dependencies:
      header: "Dependencias de [green]{step_id}[/]:"
      no_dependencies: "No hay dependencias para [green]{step_id}[/]"
      found: "Encontrado [cyan]{precedent}[/]"
    environment:
      defined: "Variable de entorno definida para [cyan]{file_name}[/]"
      variable: "[yellow]{key}[/]{description}"
      missing: "[red]Faltan valores de entorno[/] para el paso [yellow]{step_id}[/]"
      missing_value: "[red]{key}[/]: {value}"

  # Mensajes de la biblioteca
  library:
    content: "[bold]Contenido de la biblioteca:[/]"
    templates_from: "Plantillas de [cyan]'{plugin_name}'[/]:"
    template_overriden: "- [yellow]'{template_id}'[/]: [red]SOBRESCRITO[/]"
    template_info: "{template}"
    template_desc: "- [cyan]'{id}'[/]{description}"
    template_invalid: "[red]{template_id} no es un ID de plantilla válido[/]"
    plugin:
      loading: "Cargando plugin [cyan]{name}[/]"
      loaded_templates: "Cargadas [green]{count}[/] plantillas desde archivos del plugin"
      template_count: "El plugin contiene [green]{count}[/] plantillas"
    reloading: "[yellow]Recargando[/] biblioteca de plantillas"
    loading: "[green]Cargando[/] biblioteca de plantillas"

  # Mensajes del punto de entrada
  entrypoint:
    context: "Estableciendo contexto desde [cyan]project.csm[/]"
    simulation:
      info: "Simulación: [cyan]{simulation}[/]"
      probes_topic: "Tema de medidas de sondas: [cyan]{topic}[/]"
      no_probes_topic: "[yellow]Sin tema de medidas de sondas[/]"
      control_topic: "Tema del plano de control: [cyan]{topic}[/]. El binario del simulador puede manejar [yellow]CSM_CONTROL_PLANE_TOPIC[/] directamente, por lo que no se transforma como argumento."
      no_control_topic: "[yellow]Sin tema del plano de control[/]"
      args: "Argumentos del simulador: [cyan]{args}[/]"
      no_template: "No hay ID de plantilla de ejecución definido en la variable de entorno [yellow]\"CSM_RUN_TEMPLATE_ID\"[/], ejecutando modo simulador directo"
    start: "[bold]Punto de entrada Csm-orc[/]"

  # Listado de plantillas
  templates:
    template_info: "{template}"
    template_desc: "- [cyan]'{id}'[/]{description}"
    no_templates: "[yellow]No hay plantillas disponibles para mostrar[/]"

  # Mensajes de ejecución
  run:
    starting: "Iniciando orquestador de ejecución versión [cyan]{version}[/]"
    sections:
      run: "[bold cyan]===      Ejecución     ===[/]"
      results: "[bold green]===     Resultados    ===[/]"
      exit_handlers: "[bold yellow]===   Manejadores de Salida   ===[/]"
    writing_env: "Escribiendo archivo de entorno [cyan]\"{target}\"[/]"

  # Documentación
  docs:
    open_failed: "[red]Error al abrir:[/] {url}"
    opened: "Abierto [cyan]{url}[/] en su navegador"

  # Mensajes de error
  errors:
    missing_library: "[red]Necesita instalar la biblioteca[/] [cyan]`cosmotech-run-orchestrator`[/] [red]en su contenedor. Verifique si está configurada en su requirements.txt.[/]"
    no_run_json: "[red]No hay \"run.json\" definido para la plantilla de ejecución[/] [yellow]{template_id}[/]"
    missing_env_vars: "[red]Faltan variables de entorno, revise los registros[/]"
